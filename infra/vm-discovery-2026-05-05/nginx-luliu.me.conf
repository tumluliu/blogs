server {
#        listen [::]:80;

#        root /var/www/example.com/html;
#        index index.html index.htm index.nginx-debian.html;

        server_name luliu.me;

        location / {
                 proxy_pass http://127.0.0.1:4000;
                 add_header Strict-Transport-Security "max-age=31536000";
#                try_files $uri $uri/ =404;
        }

   location = /login/oauth/access_token {
       add_header Access-Control-Allow-Origin 'https://luliu.me';
       add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
       add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
       if ($request_method = 'OPTIONS') {
             return 204;
       }
       proxy_pass https://github.com;
   }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/luliu.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/luliu.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = luliu.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;

        server_name luliu.me;
    return 404; # managed by Certbot


}
